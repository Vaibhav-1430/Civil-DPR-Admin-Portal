<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Civil DPR Admin | Users</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="users">
  <div class="app-shell">
    <aside class="sidebar" aria-label="Primary navigation">
      <div class="sidebar-header">
        <h1>Civil DPR</h1>
        <p>Admin Panel</p>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="attendance.html" class="nav-link">Attendance</a>
        <a href="dpr.html" class="nav-link">DPR</a>
        <a href="images.html" class="nav-link">Images</a>
        <a href="users.html" class="nav-link active" data-requires-super="true">Users</a>
        <button type="button" id="logoutBtn" class="nav-link nav-button danger">Logout</button>
      </nav>
    </aside>

    <main class="content-shell">
      <header class="topbar">
        <div>
          <h2>User Management</h2>
          <p class="muted">Super admin controls for roles and site assignments.</p>
        </div>
        <div class="topbar-actions">
          <select id="siteSelector" class="input compact" aria-label="Select site"></select>
          <span id="userBadge" class="role-badge">-</span>
        </div>
      </header>

      <section class="panel">
        <h3>Create / Update User</h3>
        <form id="userForm" class="form-grid" novalidate>
          <div>
            <label for="userUid">User UID</label>
            <input id="userUid" class="input" required placeholder="Firebase Auth UID" />
          </div>
          <div>
            <label for="userName">Name</label>
            <input id="userName" class="input" required placeholder="Full name" />
          </div>
          <div>
            <label for="userEmail">Email</label>
            <input id="userEmail" type="email" class="input" required placeholder="user@company.com" />
          </div>
          <div>
            <label for="userRole">Role</label>
            <select id="userRole" class="input" required>
              <option value="admin">Admin</option>
              <option value="worker">Worker</option>
            </select>
          </div>
          <div class="full">
            <label for="userSites">Assigned Sites</label>
            <select id="userSites" class="input" multiple></select>
          </div>
          <div class="full form-actions">
            <button type="submit" class="btn btn-primary">Save User</button>
            <button id="userFormReset" type="button" class="btn btn-secondary">Clear</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Sites</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="usersTableBody"></tbody>
          </table>
        </div>
        <div id="usersEmpty" class="empty-state hidden">No users found.</div>
      </section>
    </main>
  </div>

  <div id="globalLoader" class="loader-overlay hidden" role="status" aria-live="polite">
    <div class="spinner"></div>
    <p>Loading users...</p>
  </div>
  <div id="toastRoot" class="toast-root" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
