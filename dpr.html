<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Civil DPR Admin | DPR</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="dpr">
  <div class="app-shell">
    <aside class="sidebar" aria-label="Primary navigation">
      <div class="sidebar-header">
        <h1>Civil DPR</h1>
        <p>Admin Panel</p>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="attendance.html" class="nav-link">Attendance</a>
        <a href="dpr.html" class="nav-link active">DPR</a>
        <a href="images.html" class="nav-link">Images</a>
        <a href="users.html" class="nav-link" data-requires-super="true">Users</a>
        <button type="button" id="logoutBtn" class="nav-link nav-button danger">Logout</button>
      </nav>
    </aside>

    <main class="content-shell">
      <header class="topbar">
        <div>
          <h2>DPR Management</h2>
          <p class="muted">Daily project report entries with real-time updates.</p>
        </div>
        <div class="topbar-actions">
          <select id="siteSelector" class="input compact" aria-label="Select site"></select>
          <span id="userBadge" class="role-badge">-</span>
        </div>
      </header>

      <section class="panel">
        <div class="filters-grid">
          <div>
            <label for="dprDate">Date</label>
            <input id="dprDate" type="date" class="input" />
          </div>
          <div class="filter-actions">
            <button id="dprClearFilters" type="button" class="btn btn-secondary">Clear Filters</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Site</th>
                <th>Work Description</th>
                <th>Quantity</th>
                <th>Remarks</th>
              </tr>
            </thead>
            <tbody id="dprTableBody"></tbody>
          </table>
        </div>
        <div id="dprEmpty" class="empty-state hidden">No DPR entries found.</div>
      </section>
    </main>
  </div>

  <div id="globalLoader" class="loader-overlay hidden" role="status" aria-live="polite">
    <div class="spinner"></div>
    <p>Loading DPR entries...</p>
  </div>
  <div id="toastRoot" class="toast-root" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
