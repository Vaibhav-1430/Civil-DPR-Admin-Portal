<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Civil DPR Admin | Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="login" class="login-page">
  <main class="login-shell">
    <section class="login-panel" aria-labelledby="login-heading">
      <div class="brand-block">
        <p class="eyebrow">Civil DPR App</p>
        <h1 id="login-heading">Admin Command Center</h1>
        <p class="muted">Secure access for site operations and progress intelligence.</p>
      </div>

      <form id="loginForm" class="auth-form" novalidate>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required placeholder="admin@company.com" />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="Enter password" />

        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      </form>

      <p class="tiny muted">Authorized users only. Activity may be logged for security.</p>
    </section>

    <aside class="login-visual" aria-hidden="true">
      <div class="grid-glow"></div>
      <div class="visual-card">
        <h2>Real-time Site Control</h2>
        <p>Track attendance, DPR updates, media uploads, and team performance from one dashboard.</p>
      </div>
    </aside>
  </main>

  <div id="globalLoader" class="loader-overlay hidden" role="status" aria-live="polite">
    <div class="spinner"></div>
    <p>Authenticating...</p>
  </div>

  <div id="toastRoot" class="toast-root" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
