<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Civil DPR Admin | Images</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="images">
  <div class="app-shell">
    <aside class="sidebar" aria-label="Primary navigation">
      <div class="sidebar-header">
        <h1>Civil DPR</h1>
        <p>Admin Panel</p>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="attendance.html" class="nav-link">Attendance</a>
        <a href="dpr.html" class="nav-link">DPR</a>
        <a href="images.html" class="nav-link active">Images</a>
        <a href="users.html" class="nav-link" data-requires-super="true">Users</a>
        <button type="button" id="logoutBtn" class="nav-link nav-button danger">Logout</button>
      </nav>
    </aside>

    <main class="content-shell">
      <header class="topbar">
        <div>
          <h2>Image Management</h2>
          <p class="muted">Site uploads from Firebase Storage with metadata.</p>
        </div>
        <div class="topbar-actions">
          <select id="siteSelector" class="input compact" aria-label="Select site"></select>
          <span id="userBadge" class="role-badge">-</span>
        </div>
      </header>

      <section class="panel">
        <div id="imageGrid" class="image-grid" aria-live="polite"></div>
        <div id="imageEmpty" class="empty-state hidden">No images found for this site.</div>
      </section>
    </main>
  </div>

  <div id="imageModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="imageModalTitle">
    <div class="modal-card">
      <button id="closeImageModal" class="modal-close" type="button" aria-label="Close preview">&times;</button>
      <h3 id="imageModalTitle">Image Preview</h3>
      <img id="modalImage" src="" alt="Site upload preview" />
      <dl class="meta-list">
        <div><dt>Site</dt><dd id="modalSite">-</dd></div>
        <div><dt>Date</dt><dd id="modalDate">-</dd></div>
        <div><dt>Uploader</dt><dd id="modalUploader">-</dd></div>
      </dl>
    </div>
  </div>

  <div id="globalLoader" class="loader-overlay hidden" role="status" aria-live="polite">
    <div class="spinner"></div>
    <p>Loading images...</p>
  </div>
  <div id="toastRoot" class="toast-root" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
